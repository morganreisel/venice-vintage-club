name: Daily Photo Sync Scheduler

on:
  # Every day at 9am PT (4pm UTC)
  schedule:
    - cron: '0 16 * * *'

jobs:
  trigger-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger photo sync
        run: gh workflow run sync-drive.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
