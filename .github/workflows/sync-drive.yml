name: Sync Google Drive Photos

on:
  # Every day at 9am PT (4pm UTC)
  schedule:
    - cron: '0 16 * * *'
  # Can also be triggered manually from GitHub Actions UI
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install gdown
          sudo apt-get update && sudo apt-get install -y imagemagick libheif-examples

      - name: Enable ImageMagick HEIC support
        run: |
          # Remove restrictive ImageMagick policy for HEIC
          sudo sed -i 's/<policy domain="coder" rights="none" pattern="HEIC"/<policy domain="coder" rights="read|write" pattern="HEIC"/' /etc/ImageMagick-6/policy.xml 2>/dev/null || true

      - name: Run sync script
        run: python3 sync-drive.py --replace

      - name: Commit and push changes
        run: |
          git config user.name "VVC Photo Sync"
          git config user.email "actions@venicevintageclub.com"
          git add images/ index.html .drive-manifest.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "Sync photos from Google Drive — $TIMESTAMP"
            git pull --rebase
            git push
          fi

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - uses: actions/deploy-pages@v4
