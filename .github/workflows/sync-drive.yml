name: Sync Google Drive Photos

on:
  # Weekly on Monday at 9am PT (4pm UTC)
  schedule:
    - cron: '0 16 * * 1'
  # Manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      mode:
        description: 'Sync mode'
        required: true
        default: 'add'
        type: choice
        options:
          - add
          - replace

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install gdown
          sudo apt-get update && sudo apt-get install -y imagemagick libheif-examples

      - name: Enable ImageMagick HEIC support
        run: |
          # Remove restrictive ImageMagick policy for HEIC
          sudo sed -i 's/<policy domain="coder" rights="none" pattern="HEIC"/<policy domain="coder" rights="read|write" pattern="HEIC"/' /etc/ImageMagick-6/policy.xml 2>/dev/null || true

      - name: Run sync script
        run: |
          MODE_FLAG=""
          if [ "${{ github.event.inputs.mode }}" = "replace" ]; then
            MODE_FLAG="--replace"
          fi
          python3 sync-drive.py $MODE_FLAG

      - name: Commit and push changes
        run: |
          git config user.name "VVC Photo Sync"
          git config user.email "actions@venicevintageclub.com"
          git add images/ index.html .drive-manifest.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "Sync photos from Google Drive — $TIMESTAMP"
            git push
          fi
